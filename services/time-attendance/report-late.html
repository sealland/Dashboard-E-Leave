<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายงานมาสาย — HR Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"><span></span><span></span><span></span></div>
          <p class="brand-title">HR</p>
        </div>
        <nav class="sidebar-nav">
          <a class="nav-item" href="/">ศูนย์ Dashboard</a>
          <a class="nav-item" href="./">เมนูรายงาน</a>
          <a class="nav-item" href="./index.html">รายงานลา</a>
          <a class="nav-item" href="./report-ot.html">รายงานโอที</a>
        </nav>
        <div class="sidebar-user">
          <div class="avatar">ผ</div>
          <div>
            <strong>ผู้บริหาร</strong>
            <span>Executive</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="page-head">
          <div>
            <p class="eyebrow">รายงานเชิงลึก</p>
            <h1>รายงาน<span>มาสาย</span></h1>
            <p class="page-subtitle" id="range-label">กำลังโหลดข้อมูล...</p>
            <p class="connection-status" id="connection-status">กำลังเชื่อมต่อ...</p>
          </div>
          <div class="toolbar">
            <label class="control">
              <span>ตั้งแต่</span>
              <input id="from-input" type="date" />
            </label>
            <label class="control">
              <span>ถึง</span>
              <input id="to-input" type="date" />
            </label>
            <label class="control">
              <span>สาขา</span>
              <select id="branch-select"><option value="all">สาขาทั้งหมด</option></select>
            </label>
            <label class="control">
              <span>แผนก</span>
              <select id="department-select"><option value="all">แผนกทั้งหมด</option></select>
            </label>
          </div>
        </header>

        <div id="loading-banner" class="loading-banner" hidden>
          <span class="loading-spinner" aria-hidden="true"></span>
          <span class="loading-text">กำลังโหลดข้อมูลจากระบบ...</span>
        </div>

        <section id="summary-grid" class="stats-grid"></section>

        <section class="report-section">
          <div class="panel-head">
            <div>
              <h2>รายชื่อพนักงานมาสาย</h2>
              <p>กดที่แต่ละรายการเพื่อดูสรุปรายวันและข้อมูลต้นทางจากระบบ</p>
            </div>
          </div>
          <div id="report-body" class="report-list"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./report-late.js"></script>
  </body>
</html>
